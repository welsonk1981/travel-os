<!doctype html>
<html lang="zh-Hant">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>北廣島三井 OUTLET｜逛店地圖</title>
<style>
  :root{--ink:#172437;--muted:#627386;--line:#d7e0e8;--blue:#e8f1fb;--green:#e9f5ec;--yellow:#fff5dc}
  *{box-sizing:border-box}
  body{margin:0;background:#f3f5f7;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}
  main{max-width:1500px;margin:auto;padding:12px}
  .head,.card{background:#fff;border:1px solid var(--line);border-radius:16px}
  .head{padding:15px 16px;margin-bottom:12px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:22px;margin:0}
  .back{white-space:nowrap;padding:7px 10px;border-radius:999px;background:#fff;color:#174f83;text-decoration:none;border:1px solid #cbd7e1;font-size:13px}
  .order{margin-top:5px;color:var(--muted);font-size:13px}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;color:var(--muted);font-size:12px}
  .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px;vertical-align:-2px;border:1px solid #aab8c5}
  .b{background:var(--blue)}.g{background:var(--green)}.y{background:var(--yellow)}
  .maps{display:grid;gap:12px}
  .card{padding:4px;overflow:hidden}
  .card img{width:100%;display:block;border-radius:12px}
  @media(max-width:600px){main{padding:7px}.head{padding:12px}h1{font-size:19px}.back{font-size:12px}}
</style>
<main>
  <header class="head">
    <div class="top">
      <h1>北廣島三井 OUTLET｜逛店地圖</h1>
      <a class="back" href="../../">返回行程</a>
    </div>
    <div class="order">建議順序：Clover 1F → Clover 2F → Maple 2F</div>
    <div class="legend">
      <span><i class="sw b"></i>服飾／鞋履／選物</span>
      <span><i class="sw g"></i>戶外／登山／運動</span>
      <span><i class="sw y"></i>北海道伴手禮</span>
    </div>
  </header>
  <section class="maps">
    <article class="card"><img src="clover1_destination_map_v2.svg?v=20260720-2" alt="Clover Mall 1F 目的店位置圖"></article>
    <article class="card"><img src="clover2_destination_map_v2.svg?v=20260720-2" alt="Clover Mall 2F 目的店位置圖"></article>
    <article class="card"><img src="maple2_destination_map_v2.svg?v=20260720-2" alt="Maple Mall 2F 目的店位置圖"></article>
  </section>
</main>
</html>
